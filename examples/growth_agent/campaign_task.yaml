# campaign_task.yaml — Growth campaign task definition
#
# This is the task document the Foreman passes to the Growth Head.
# Fields map directly to what the runnable demo in growth_agent.py reads.
# Customize every field for your domain.

task:
  task_id: "GROWTH-042"
  type: content_experiment
  priority: high

  # ── What we're trying to achieve ──────────────────────────────────────────
  goal: "Increase email signups for Product X by 20% over 2 weeks"

  target_audience:
    segment: "Developer advocates and technical writers"
    pain_points:
      - "Need to integrate APIs quickly without reading 50-page docs"
      - "Want working copy-paste examples, not conceptual overviews"
    channels:
      - email
      - landing_page

  budget_usd: 2000

  # ── Quality constraints (guardrails) ──────────────────────────────────────
  guardrails:
    brand_voice: "Friendly, practical — no hype. Technical but approachable."
    max_length_words: 800
    required_elements:
      - headline
      - subheadline
      - body
      - call_to_action
    forbidden:
      - "free"           # triggers spam filters in this industry
      - "guaranteed"     # brand policy
      - "limited time"   # misaligned with brand voice
      - competitor names

  # ── Success criteria (what "done" looks like) ─────────────────────────────
  success_metric:
    primary: signups_per_1k_impressions
    primary_threshold: 5.0          # must exceed to count as a "win"
    secondary: unsubscribe_rate
    secondary_max: 0.02             # must stay below (2%)
    also_track:
      - ctr                         # click-through rate
      - spam_complaints

  # ── Experiment plan ────────────────────────────────────────────────────────
  # The Growth Head uses this to spawn the right sub-agents and structure the A/B test.
  experiment:
    measurement_window_hours: 48
    minimum_impressions_per_variant: 500
    traffic_split: equal            # or e.g. "40/30/30" for control-heavy

    variants:
      - id: v1
        angle: curiosity
        directive: >
          Lead with a question or surprising fact that makes the reader want to know more.
          Avoid revealing the answer in the subject line.

      - id: v2
        angle: social_proof
        directive: >
          Open with a concrete outcome another developer achieved using the product.
          Use specific numbers (time saved, lines of code, etc.).

      - id: v3
        angle: practical_value
        directive: >
          Lead with the most concrete benefit the reader gets in the first 5 minutes.
          Emphasize zero-friction onboarding — copy-paste and it works.

  # ── Context for generation ─────────────────────────────────────────────────
  context:
    product_brief: "path/to/product_brief.md"     # replace with real path
    style_guide: "path/to/style_guide.md"          # replace with real path
    playbook: "examples/growth_agent/growth_playbook.md"  # read by Growth Head
